<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Župa sv. Marka – Kontakt</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<header>
  <div class="topbar">
    <div class="brand">
      <h1>Župa sv. Marka Evanđelista</h1>
      <p>Kontakt i upiti</p>
    </div>
    <span class="badge">Javite nam se</span>
  </div>
  <nav>
    <div class="nav-inner">
      <a href="index.html">Početna</a>
      <a href="raspored.html">Raspored</a>
      <a href="zajednica.html">Zajednica</a>
      <a class="active" href="kontakt.html">Kontakt</a>
    </div>
  </nav>
</header>

<main>
  <section class="card">
    <h3>Kontakt obrazac</h3>

    <form id="kontaktForma">
      <div class="form-row">
        <label for="ime">Ime i prezime</label>
        <input type="text" id="ime" />
      </div>

      <div class="form-row">
        <label for="email">E-mail</label>
        <input type="text" id="email" />
      </div>

      <div class="form-row">
        <label for="poruka">Poruka</label>
        <textarea id="poruka"></textarea>
      </div>

      <button type="submit">Pošalji</button>
      <p id="status" class="small"></p>
    </form>
  </section>
</main>

<footer>
  <div class="footer-inner">
    <div>Kontakt: info@zupa-marko.test</div>
    <div><a href="index.html">Početna</a></div>
  </div>
</footer>

<script src="../js/app.js"></script>
</body>
</html>
